name: mauro_taxi
description: Where's My Driver — Real-time driver tracking app
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.4
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  uuid: ^4.5.1
  permission_handler: ^11.4.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.0
  flutter_local_notifications: ^17.2.4
  share_plus: ^10.1.4
  flutter_foreground_task: ^8.0.0
  livekit_client: ^2.6.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#003461"
  adaptive_icon_foreground: "assets/icon.png"
